                        desc: "並非所有供應商都處於同等地位，統一對待將導致災難性的效率低落。Peter Kraljic 的採購組合矩陣是現代採購策略的決定性架構。它根據「利潤影響」與「供應風險」兩個構面將採購項目分類。透過將項目映射到四個象限——槓桿、策略、瓶頸與非關鍵——組織可以適當地調整其營運行為。\n\n「策略性項目」需要深度、長期的夥伴關係以及高層的對接。相反，「非關鍵項目」應該在基礎運作上高度自動化，以大幅降低交易成本。最具挑戰性的構面是「瓶頸項目」——利潤影響低但供應風險極高的零組件。針對這類項目，策略必須轉向產量保障與維持安全庫存。\n\n領先的科技巨頭持續利用此架構來應對晶片短缺。透過擺脫單一來源依賴，他們將採購從被動的買賣功能轉變為主動的策略性武器。",

                        desc: "零售產業的版圖已從孤立的銷售管道，不可逆轉地轉向整合的「全通路」(Omni-channel) 生態系。對企業而言，決定採用直營、經銷商或批發模式，高度取決於產品屬性與基礎成本限制。然而，現今真正的策略優勢在於 O2O（線上線下整合）。\n\nO2O 最典型的架構是 BOPIS 模式（線上下單，線下取貨）。此策略不僅滿足了消費者對即時獲得產品的渴望並省下運費，更能將關鍵的客流量引導至實體店面，創造追加銷售的機會。AI 在此扮演核心角色，透過分析顧客歷史，在取貨過程中提供個人化的商品推薦。\n\n此外，AI 能透過智慧促銷策略優化庫存週轉率。與其單純依賴會破壞毛利的降價打折，AI 能建議最佳的「聯合促銷」(Bundling) 策略，在不貶低品牌價值的情況下清除滯銷庫存。",

                            <div>
                                <label className="flex justify-between text-sm font-bold mb-2">
                                    <span>{lang==='EN'?'Annual Demand (D)':'年度總需求量 (D)'}</span> <span>{D}</span>
                                </label>
                                <input type="range" min="1000" max="20000" step="500" value={D} onChange={e=>setD(e.target.value)} className="w-full" />
                            </div>
                            <div>
                                <label className="flex justify-between text-sm font-bold mb-2">
                                    <span>{lang==='EN'?'Order Cost (S)':'單次訂購成本 (S)'}</span> <span>${S}</span>
                                </label>
                                <input type="range" min="10" max="500" step="10" value={S} onChange={e=>setS(e.target.value)} className="w-full" />
                            </div>
                            <div>
                                <label className="flex justify-between text-sm font-bold mb-2">
                                    <span>{lang==='EN'?'Holding Cost/Unit (H)':'單位持有成本 (H)'}</span> <span>${H}</span>
                                </label>
                                <input type="range" min="1" max="50" step="1" value={H} onChange={e=>setH(e.target.value)} className="w-full" />
                            </div>
                        </div>
                        <div className="flex flex-col items-center justify-center bg-[var(--bcg-primary)] border border-[var(--bcg-gold)] p-8 text-center">
                            <span className="text-[10px] font-bold uppercase tracking-widest text-[var(--bcg-gold)] mb-2">{lang === 'EN' ? 'Optimal Order Quantity' : '最佳訂購數量'}</span>
                            <span className="text-6xl font-serif-title font-bold break-all">{eoq}</span>
                            <span className="text-sm mt-4 opacity-70">{lang === 'EN' ? 'Formula' : '計算公式'}: √(2DS / H)</span>
                        </div>
                    </div>
                </div>
            );
        };

        const LabRadar = ({ lang }) => {
            const [scores, setScores] = useState([5,5,5,5,5,5]);
            const labels = ["Political", "Economic", "Social", "Tech", "Env", "Legal"];
            const updateScore = (idx, val) => { const n = [...scores]; n[idx] = val; setScores(n); };
            
            const cx=150, cy=150, rMax=100;
            const points = scores.map((s, i) => {
                const angle = (Math.PI / 3) * i - Math.PI / 2;
                const r = (s / 10) * rMax;
                return `${cx + r * Math.cos(angle)},${cy + r * Math.sin(angle)}`;
            }).join(' ');

            return (
                <div className="bg-white/5 border border-[var(--bcg-border)] p-6 shadow-md mb-12">
                    <h3 className="text-2xl font-serif-title font-bold mb-6">{lang==='EN'?'3. PESTEL Radar Evaluator':'3. PESTEL 雷達評估器'}</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div className="space-y-4" aria-hidden="true">
                            {labels.map((lb, i) => (
                                <div key={i}>
                                    <label className="flex justify-between text-xs font-bold mb-1">
                                        <span>{lb} {lang==='EN'?'Risk':'風險'}</span> <span>{scores[i]}/10</span>
                                    </label>
                                    <input type="range" min="1" max="10" value={scores[i]} onChange={e=>updateScore(i, e.target.value)} className="w-full" />
                                </div>
                            ))}
                        </div>
                        <div className="flex justify-center items-center">
                            <svg width="300" height="300">
                                {[0.2, 0.4, 0.6, 0.8, 1].map(scale => (
                                    <polygon key={scale} points={labels.map((_, i) => `${cx + (rMax*scale)*Math.cos((Math.PI/3)*i - Math.PI/2)},${cy + (rMax*scale)*Math.sin((Math.PI/3)*i - Math.PI/2)}`).join(' ')} fill="none" stroke="rgba(255,255,255,0.1)" />
                                ))}
                                <polygon points={points} fill="var(--bcg-gold)" opacity="0.6" stroke="var(--bcg-gold)" strokeWidth="2" />
                            </svg>
                        </div>
                    </div>
                </div>
            );
        };

        const LabO2O = ({ lang }) => {
            const [traffic, setTraffic] = useState(1000);
            const [bopisRate, setBopisRate] = useState(5);
            const [upsellRate, setUpsellRate] = useState(15);
            const [aov, setAov] = useState(50);
            
            const bopisOrders = Math.floor(traffic * (bopisRate / 100));
            const baseRev = bopisOrders * aov;
            const upsellOrders = Math.floor(bopisOrders * (upsellRate / 100));
            const upsellRev = upsellOrders * aov;
            const totalRev = baseRev + upsellRev;

            return (
                <div className="bg-white/5 border border-[var(--bcg-border)] p-6 shadow-md">
                    <h3 className="text-2xl font-serif-title font-bold mb-6">{lang==='EN'?'4. O2O ROI Calculator':'4. O2O 全通路 ROI 計算機'}</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div className="space-y-6" aria-hidden="true">
                            <div>
                                <label className="flex justify-between text-xs font-bold mb-1"><span>{lang==='EN'?'Daily Web Traffic':'每日網站流量'}</span> <span>{traffic}</span></label>
                                <input type="range" min="100" max="10000" step="100" value={traffic} onChange={e=>setTraffic(e.target.value)} className="w-full" />
                            </div>
                            <div>
                                <label className="flex justify-between text-xs font-bold mb-1"><span>{lang==='EN'?'BOPIS Conversion Rate':'線下取貨轉換率'}</span> <span>{bopisRate}%</span></label>
                                <input type="range" min="1" max="20" step="1" value={bopisRate} onChange={e=>setBopisRate(e.target.value)} className="w-full" />
                            </div>
                            <div>
                                <label className="flex justify-between text-xs font-bold mb-1"><span>{lang==='EN'?'In-store Upsell Rate':'門市追加購買率'}</span> <span>{upsellRate}%</span></label>
                                <input type="range" min="1" max="50" step="1" value={upsellRate} onChange={e=>setUpsellRate(e.target.value)} className="w-full" />
                            </div>
                            <div>
                                <label className="flex justify-between text-xs font-bold mb-1"><span>{lang==='EN'?'Average Order Value (AOV)':'平均客單價 (AOV)'}</span> <span>${aov}</span></label>
                                <input type="range" min="10" max="500" step="10" value={aov} onChange={e=>setAov(e.target.value)} className="w-full" />
                            </div>
                        </div>
                        <div className="flex flex-col justify-center bg-[var(--bcg-primary)] border border-[var(--bcg-gold)] p-8">
                            <div className="mb-4">
                                <div className="text-[10px] font-bold uppercase opacity-50 mb-1">{lang==='EN'?'Base Revenue':'基礎營收'}</div>
                                <div className="text-2xl font-serif-title break-all">${baseRev.toLocaleString()}</div>
                            </div>
                            <div className="mb-4">
                                <div className="text-[10px] font-bold uppercase text-[var(--bcg-gold)] mb-1">{lang==='EN'?'Incremental Upsell Revenue':'追加銷售增額營收'}</div>
                                <div className="text-2xl font-serif-title text-[var(--bcg-gold)] break-all">+ ${upsellRev.toLocaleString()}</div>
                            </div>
                            <div className="mt-4 pt-4 border-t border-white/20">
                                <div className="text-[10px] font-bold uppercase opacity-50 mb-1">{lang==='EN'?'Total O2O Revenue':'總計 O2O 營收'}</div>
                                <div className="text-4xl md:text-5xl font-serif-title font-bold break-all">${totalRev.toLocaleString()}</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };


        // ==========================================
        // 3. MAIN APPLICATION ROUTING
        // ==========================================
        const Icon = ({ name, className }) => {
            const spanRef = useRef(null);
            useEffect(() => {
                if (spanRef.current && window.lucide) {
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    if (className) i.className = className;
                    spanRef.current.innerHTML = '';
                    spanRef.current.appendChild(i);
                    lucide.createIcons({ root: spanRef.current });
                }
            }, [name, className]);
            return <span ref={spanRef} className="inline-flex items-center justify-center ui-protect"></span>;
        };

        const App = () => {
            const [lang, setLang] = useState('EN');
            const [isDark, setIsDark] = useState(true);
            const [currentPage, setCurrentPage] = useState(0); 
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            
            // Analytics Core State Update
            const [analytics, setAnalytics] = useState({
                startTime: Date.now(),
                pageTimes: {},
                interactions: 0,
                cardsShown: new Set(),
                cardsFlipped: new Set(),
                quizAnswers: {} // Object tracking unique ID `${themeIdx}-${qIndex}` -> boolean
            });

            const [userInfo, setUserInfo] = useState({ group: 'G1', id: '', name: '' });
            const [shouldClearData, setShouldClearData] = useState(false);

            const t = CONTENT[lang];

            useEffect(() => {
                document.body.className = isDark ? 'dark' : 'light';
            }, [isDark]);

            useEffect(() => {
                const timer = setInterval(() => {
                    setAnalytics(prev => ({ ...prev, pageTimes: { ...prev.pageTimes, [currentPage]: (prev.pageTimes[currentPage] || 0) + 1 } }));
                }, 1000);
                return () => clearInterval(timer);
            }, [currentPage]);

            const trackInteraction = () => setAnalytics(prev => ({ ...prev, interactions: prev.interactions + 1 }));

            // 語音導覽 (Voice Navigation) with filtering logic
            const [isSpeaking, setIsSpeaking] = useState(false);
            const synth = typeof window !== 'undefined' ? window.speechSynthesis : null;
            
            const speak = useCallback((text) => {
                if (!synth || !text) return;
                synth.cancel();
                const cleanText = DOMPurify.sanitize(text, { ALLOWED_TAGS: [] }); 
                const msg = new SpeechSynthesisUtterance(cleanText);
                
                const voices = synth.getVoices();
                if (lang === 'EN') {
                    msg.lang = 'en-GB';
                    msg.voice = voices.find(v => v.lang === 'en-GB' && (v.name.includes('Male') || v.name.includes('George'))) 
                             || voices.find(v => v.lang === 'en-GB') 
                             || voices.find(v => v.lang.startsWith('en')) 
                             || voices[0];
                } else {
                    msg.lang = 'zh-TW';
                    msg.voice = voices.find(v => v.lang === 'zh-TW' && (v.name.includes('Yating') || v.name.includes('Han') || v.name.includes('Hsiao'))) 
                             || voices.find(v => v.lang === 'zh-TW') 
                             || voices.find(v => v.lang.startsWith('zh')) 
                             || voices[0];
                }

                msg.onend = () => setIsSpeaking(false);
                msg.onerror = () => setIsSpeaking(false);
                synth.speak(msg);
                setIsSpeaking(true);
                trackInteraction();
            }, [lang, synth]);

            const togglePlayPause = () => {
                if (!synth) return;
                if (synth.speaking) {
                    if (synth.paused) { synth.resume(); setIsSpeaking(true); } 
                    else { synth.pause(); setIsSpeaking(false); }
                } else {
                    // Clone the container to strip out buttons and ui-elements before reading
                    const container = document.getElementById('readable-content');
                    if (container) {
                        const clone = container.cloneNode(true);
                        // Remove all explicitly hidden aria elements (buttons, ranges, etc)
                        const hiddenElements = clone.querySelectorAll('[aria-hidden="true"], button, input, select');
                        hiddenElements.forEach(el => el.parentNode && el.parentNode.removeChild(el));
                        speak(clone.innerText);
                    }
                }
            };
            const stopVoice = () => { if (synth) { synth.cancel(); setIsSpeaking(false); } };
            const scrollToTop = () => { window.scrollTo({ top: 0, behavior: 'smooth' }); trackInteraction(); };
            const navigateTo = (idx) => { stopVoice(); setCurrentPage(idx); setIsMenuOpen(false); scrollToTop(); };

            useEffect(() => {
                const handleContextMenu = (e) => {
                    const selection = window.getSelection().toString();
                    if (selection.length > 0) return; 
                    e.preventDefault();
                    alert("Intellectual Property of Prof. Shihmin Lo");
                };
                const handleKeyDown = (e) => {
                    if (e.key === 'F12' || (e.ctrlKey && e.key.toLowerCase() === 'u') || (e.ctrlKey && e.shiftKey && ['i', 'j', 'c'].includes(e.key.toLowerCase()))) {
                        e.preventDefault();
                        alert("Intellectual Property of Prof. Shihmin Lo");
                    }
                };
                document.addEventListener('contextmenu', handleContextMenu);
                document.addEventListener('keydown', handleKeyDown);
                return () => { document.removeEventListener('contextmenu', handleContextMenu); document.removeEventListener('keydown', handleKeyDown); };
            }, []);

            return (
                <div className="min-h-screen flex flex-col justify-between">
                    {/* ===== HEADER ===== */}
                    <header className={`fixed top-0 w-full h-16 z-50 flex items-center justify-between px-6 lg:px-12 border-b ui-protect ${isDark ? 'bg-[var(--bcg-primary)]/95 border-white/10' : 'bg-[#FAFAFA]/95 border-black/10'} backdrop-blur-md`}>
                        <div className="flex items-center space-x-4">
                            <button onClick={() => { setIsMenuOpen(!isMenuOpen); trackInteraction(); }} className="p-1 hover:text-[var(--bcg-gold)] transition">
                                <Icon name={isMenuOpen ? "x" : "menu"} className="w-5 h-5" />
                            </button>
                            
                            <div className="flex items-center cursor-pointer group" onClick={() => scrollToTop()}>
                                <div className="px-2 h-6 bg-[var(--bcg-gold)] flex items-center justify-center rounded-sm">
                                    <span className="text-[var(--bcg-primary)] font-serif-title font-bold text-sm tracking-wider">{t.brand}</span>
                                </div>
                                <span className="ml-3 font-serif-title font-bold text-sm tracking-widest uppercase hidden sm:block opacity-90">{t.brandFull}</span>
                            </div>

                            <button onClick={() => navigateTo(0)} className="ml-2 p-1 hover:text-[var(--bcg-gold)] transition hidden sm:block" title="Home">
                                <Icon name="home" className="w-5 h-5" />
                            </button>
                        </div>

                        <div className="flex items-center space-x-4 lg:space-x-6 text-sm">
                            <div className="flex items-center space-x-3 border-r border-[var(--bcg-border)] pr-4 lg:pr-6">
                                <button onClick={togglePlayPause} className={`transition flex items-center gap-1.5 uppercase text-[10px] font-bold tracking-widest ${isSpeaking ? 'text-[var(--bcg-gold)]' : 'hover:opacity-70'}`}>
                                    <Icon name={isSpeaking && (!synth || !synth.paused) ? "pause" : "play"} className="w-4 h-4" />
                                    <span className="hidden md:block">Voice</span>
                                </button>
                                <button onClick={stopVoice} className="hover:text-[var(--bcg-red)] transition">
                                    <Icon name="square" className="w-3.5 h-3.5 fill-current" />
                                </button>
                            </div>
                            <button onClick={() => { setLang(lang === 'EN' ? 'ZH' : 'EN'); trackInteraction(); stopVoice(); }} className="text-[10px] font-bold tracking-widest uppercase hover:text-[var(--bcg-gold)] transition">
                                {lang === 'EN' ? '繁中' : 'EN'}
                            </button>
                            <button onClick={() => { setIsDark(!isDark); trackInteraction(); }} className="hover:text-[var(--bcg-gold)] transition">
                                <Icon name={isDark ? "sun" : "moon"} className="w-4 h-4" />
                            </button>
                        </div>
                    </header>

                    {/* ===== SIDEBAR ===== */}
                    {isMenuOpen && (
                        <div className="fixed inset-0 z-40 bg-black/40 backdrop-blur-sm ui-protect" onClick={() => setIsMenuOpen(false)}>
                            <div className={`fixed top-0 left-0 h-full w-80 shadow-2xl overflow-y-auto transform transition-transform ${isDark ? 'bg-[var(--bcg-primary)] border-r border-white/5' : 'bg-white border-r border-black/5'}`} onClick={e => e.stopPropagation()}>
                                <div className="p-8 border-b border-[var(--bcg-border)]">
                                    <h2 className="text-[10px] font-bold tracking-widest uppercase text-[var(--bcg-gold)] mb-2">Navigation</h2>
                                    <div className="font-serif-title font-bold text-xl">{t.brandFull}</div>
                                </div>
                                <nav className="p-4 space-y-1">
                                    {t.nav.map((item, idx) => {
                                        let iconName = "file-text";
                                        if(idx===0) iconName="layout-dashboard";
                                        if(idx===7) iconName="flask-conical";
                                        if(idx===8) iconName="library";
                                        if(idx===9) iconName="bar-chart-2";

                                        return (
                                        <button key={idx} onClick={() => navigateTo(idx)} className={`w-full flex items-center px-4 py-3 text-left text-sm transition-all rounded-sm ${currentPage === idx ? 'bg-[var(--bcg-accent)] text-white font-bold' : 'hover:bg-black/5 dark:hover:bg-white/5 font-medium'}`}>
                                            <Icon name={iconName} className={`w-4 h-4 mr-3 ${currentPage === idx ? 'text-[var(--bcg-gold)]' : 'opacity-40'}`} />
                                            <span className={`w-6 text-xs font-bold opacity-40`}>{idx < 10 ? `0${idx}` : idx}</span>
                                            {item.split('. ')[1] || item}
                                        </button>
                                    )})}
                                </nav>
                            </div>
                        </div>
                    )}

                    {/* ===== MAIN CONTENT ===== */}
                    <main id="readable-content" className="pt-28 pb-20 px-6 lg:px-12 max-w-5xl mx-auto w-full flex-grow">
                        {currentPage === 0 && <PageSummary t={t} lang={lang} navigateTo={navigateTo} />}
                        {currentPage >= 1 && currentPage <= 6 && (
                            <PageTheme 
                                key={`theme-${currentPage}`} themeIdx={currentPage} theme={t.themes[currentPage - 1]} t={t} lang={lang} 
                                analytics={analytics} setAnalytics={setAnalytics} onPrev={() => navigateTo(currentPage - 1)} onNext={() => navigateTo(currentPage + 1)} 
                            />
                        )}
                        {currentPage === 7 && <PageLab t={t} lang={lang} onPrev={() => navigateTo(6)} onNext={() => navigateTo(8)} />}
                        {currentPage === 8 && <PageResources t={t} track={trackInteraction} onPrev={() => navigateTo(7)} onNext={() => navigateTo(9)} />}
                        {currentPage === 9 && <PageAnalytics t={t} lang={lang} analytics={analytics} userInfo={userInfo} setUserInfo={setUserInfo} brand={t.brandFull} shouldClearData={shouldClearData} setShouldClearData={setShouldClearData} setAnalyticsState={setAnalytics} themes={t.themes} onPrev={() => navigateTo(8)} />}
                    </main>

                    {/* ===== FOOTER ===== */}
                    <footer className={`fixed bottom-0 w-full h-8 z-40 flex items-center justify-between px-6 lg:px-12 text-[10px] font-bold tracking-widest uppercase border-t ui-protect ${isDark ? 'bg-[var(--bcg-primary)] border-white/10 text-white/50' : 'bg-[#FAFAFA] border-black/10 text-black/50'}`}>
                        <div>{t.footer.copy}</div>
                        <div className="flex items-center space-x-8">
                            <a href="https://www.ibs.ncnu.edu.tw/index.php/faculty/tenured-professor/299-smlo" target="_blank" className="hover:text-[var(--bcg-gold)] transition-colors">
                                {t.footer.architect}
                            </a>
                            <button onClick={scrollToTop} className="flex items-center space-x-1.5 hover:text-[var(--bcg-gold)] transition-colors">
                                <span>{t.footer.top}</span>
                                <Icon name="arrow-up" className="w-3 h-3" />
                            </button>
                        </div>
                    </footer>
                </div>
            );
        };

        // --- SUB-COMPONENTS ---

        const PageSummary = ({ t, lang, navigateTo }) => (
            <div className="animate-fade">
                <div className="text-[10px] font-bold tracking-widest uppercase text-[var(--bcg-gold)] mb-4">{t.summary.kicker}</div>
                <h1 className="text-4xl md:text-5xl font-serif-title font-bold mb-10 leading-tight">{t.summary.title}</h1>
                <div className="pl-6 border-l-2 border-[var(--bcg-gold)] mb-12">
                    <p className="text-base md:text-lg leading-relaxed whitespace-pre-line opacity-90 font-light">{t.summary.desc}</p>
                </div>

                <div className="mb-16 ui-protect" aria-hidden="true"><SvgOverview lang={lang} /></div>
                
                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-px bg-[var(--bcg-border)] border border-[var(--bcg-border)] ui-protect">
                    {t.nav.slice(1, 10).map((item, idx) => (
                        <button key={idx} onClick={() => navigateTo(idx + 1)} aria-hidden="true" className="group p-8 bg-[var(--bcg-gray-dark)] dark:bg-[var(--bcg-primary)] hover:bg-[var(--bcg-accent)] text-left transition-colors relative overflow-hidden flex flex-col justify-between min-h-[140px]">
                            <span className="text-[10px] font-bold tracking-widest uppercase text-[var(--bcg-gold)] mb-3 block">Theme 0{idx + 1}</span>
                            <h3 className="font-serif-title font-bold text-lg text-white">{item.split('. ')[1] || item}</h3>
                        </button>
                    ))}
                </div>
                <div className="flex justify-end pt-8 ui-protect">
                    <button onClick={() => navigateTo(1)} aria-hidden="true" className="px-6 py-3 bg-[var(--bcg-gold)] text-black text-xs font-bold tracking-widest uppercase hover:bg-opacity-90 transition">{t.btn.next}</button>
                </div>
            </div>
        );

        const PageTheme = ({ themeIdx, theme, t, lang, analytics, setAnalytics, onPrev, onNext }) => {
            if (!theme) return null;

            const [cardPage, setCardPage] = useState(0);
            const [flippedCards, setFlippedCards] = useState({});
            const [quizPage, setQuizPage] = useState(0);
            const [localQuizState, setLocalQuizState] = useState({});

            const safeCards = theme.cards || [];
            const visibleCards = safeCards.slice(cardPage * 2, cardPage * 2 + 2);
            
            const safeQuizzes = theme.quiz || [];
            const visibleQuizzes = safeQuizzes.slice(quizPage * 2, quizPage * 2 + 2);

            const totalCardsInTheme = safeCards.length;
            const totalQuizInTheme = safeQuizzes.length;

            // Track "Shown" cards whenever cardPage changes
            useEffect(() => {
                setAnalytics(prev => {
                    const newShown = new Set(prev.cardsShown);
                    let changed = false;
                    // Safely iterate 0 and 1 for the 2 slots max per page
                    [0, 1].forEach((offset) => {
                        const globalIndex = cardPage * 2 + offset;
                        if (globalIndex < totalCardsInTheme) {
                            const id = `${themeIdx}-${globalIndex}`;
                            if (!newShown.has(id)) {
                                newShown.add(id);
                                changed = true;
                            }
                        }
                    });
                    return changed ? { ...prev, cardsShown: newShown } : prev;
                });
            }, [cardPage, themeIdx, totalCardsInTheme, setAnalytics]);

            const handleFlip = (globalIndex) => {
                setFlippedCards(prev => ({ ...prev, [globalIndex]: !prev[globalIndex] }));
                setAnalytics(prev => {
                    const newSeen = new Set(prev.cardsFlipped).add(`${themeIdx}-${globalIndex}`);
                    return { ...prev, interactions: prev.interactions + 1, cardsFlipped: newSeen };
                });
            };

            const handleQuizAnswer = (qIndex, oIndex) => {
                const globalIndex = quizPage * 2 + qIndex;
                const uniqueQId = `${themeIdx}-${globalIndex}`;
                if (localQuizState[globalIndex] !== undefined) return; 
                
                const isCorrect = safeQuizzes[globalIndex].ans === oIndex;
                setLocalQuizState(prev => ({ ...prev, [globalIndex]: oIndex }));
                
                setAnalytics(prev => {
                    return { 
                        ...prev, 
                        interactions: prev.interactions + 1, 
                        quizAnswers: { ...prev.quizAnswers, [uniqueQId]: isCorrect } 
                    };
                });
            };

            const resetQuiz = () => {
                setLocalQuizState({});
                setQuizPage(0);
                setAnalytics(prev => ({ ...prev, interactions: prev.interactions + 1 }));
            };

            const renderSvg = () => {
                switch(themeIdx) {
                    case 1: return <SvgPestelHex lang={lang} />;
                    case 2: return <SvgKraljic lang={lang} />;
                    case 3: return <SvgContract lang={lang} />;
                    case 4: return <SvgLean lang={lang} />;
                    case 5: return <SvgAI lang={lang} />;
                    case 6: return <SvgO2O lang={lang} />;
                    default: return null;
                }
            };

            // Derive current theme metrics from Global Analytics State
            const flippedInTheme = Array.from(analytics.cardsFlipped).filter(id => id.startsWith(`${themeIdx}-`)).length;
            const shownInTheme = Array.from(analytics.cardsShown).filter(id => id.startsWith(`${themeIdx}-`)).length;
            
            const themeQuizAnswers = Object.entries(analytics.quizAnswers).filter(([id]) => id.startsWith(`${themeIdx}-`));
            const answeredQuizInTheme = themeQuizAnswers.length;
            const correctQuizInTheme = themeQuizAnswers.filter(([_, isC]) => isC).length;

            return (
                <div className="animate-fade pb-8">
                    <header className="mb-10 border-b border-[var(--bcg-border)] pb-6 ui-protect">
                        <div className="text-[10px] font-bold tracking-widest uppercase text-[var(--bcg-gold)] mb-4">{theme.kicker}</div>
                        <h1 className="text-3xl md:text-4xl font-serif-title font-bold mb-4 leading-tight">{theme.title}</h1>
                        <p className="text-lg font-serif-title italic opacity-80">{theme.overview}</p>
                    </header>

                    <div className="flex flex-wrap gap-2 mb-10 ui-protect" aria-hidden="true">
                        {(theme.highlights || []).map((h, i) => (
                            <span key={i} className="px-3 py-1 bg-black/5 dark:bg-white/5 border border-[var(--bcg-border)] text-[10px] font-bold tracking-widest uppercase rounded-sm">{h}</span>
                        ))}
                    </div>

                    {/* Core Text Content */}
                    <section className="mb-12">
                        <div className="text-base leading-relaxed opacity-90 whitespace-pre-line font-light select-text">
                            {theme.desc}
                        </div>
                    </section>

                    <div className="mb-16 ui-protect" aria-hidden="true">
                        {renderSvg()}
                    </div>

                    {/* Flashcards */}
                    <section className="mb-16 ui-protect">
                        <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-4 border-b-2 border-[var(--bcg-primary)] dark:border-white pb-2 gap-2">
                            <h3 className="text-sm font-bold tracking-widest uppercase">{t.btn.flashcards}</h3>
                            <div className="flex items-center gap-4 text-[10px] font-bold tracking-widest opacity-60" aria-hidden="true">
                                {/* Format: 已翻/顯示/總數 */}
                                <span>Flip/Show/Tot: {flippedInTheme}/{shownInTheme}/{totalCardsInTheme}</span>
                                <span className="hidden sm:inline">|</span>
                                <span>View: {cardPage * 2 + 1}-{Math.min((cardPage + 1) * 2, totalCardsInTheme)} / {totalCardsInTheme}</span>
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 select-text">
                            {visibleCards.map((card, idx) => {
                                const globalIndex = cardPage * 2 + idx;
                                const flipped = !!flippedCards[globalIndex];
                                return (
                                    <div key={globalIndex} className="perspective-1000 h-64 cursor-pointer group" onClick={() => handleFlip(globalIndex)}>
                                        <div className={`relative w-full h-full transform-style-3d flip-transition ${flipped ? 'rotate-y-180' : ''}`}>
                                            <div className="absolute inset-0 backface-hidden bg-[var(--bcg-primary)] text-white p-8 flex flex-col justify-between border-t-4 border-[var(--bcg-gold)]">
                                                <span className="text-[10px] font-bold tracking-widest uppercase opacity-50" aria-hidden="true">Concept {globalIndex + 1}</span>
                                                <h4 className="text-2xl font-serif-title font-bold text-center group-hover:scale-105 transition-transform">{card.term}</h4>
                                                <div className="flex justify-center opacity-50" aria-hidden="true"><Icon name="repeat" className="w-4 h-4" /></div>
                                            </div>
                                            <div className="absolute inset-0 backface-hidden rotate-y-180 bg-white text-black p-8 flex flex-col items-center justify-center text-center border border-[var(--bcg-border)] border-t-4 border-[var(--bcg-accent)]">
                                                <span className="text-[10px] font-bold tracking-widest uppercase text-[var(--bcg-accent)] mb-4" aria-hidden="true">{card.term}</span>
                                                <p className="text-sm leading-relaxed font-medium">{card.def}</p>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                        <div className="flex justify-end mt-6 space-x-3">
                            <button onClick={() => { setCardPage((cardPage + 1) % Math.ceil(totalCardsInTheme / 2)); }} aria-hidden="true" className="px-5 py-2 bg-[var(--bcg-primary)] text-white text-[10px] font-bold tracking-widest uppercase hover:bg-[var(--bcg-accent)] transition border border-[var(--bcg-gold)]">
                                {t.btn.nextCards}
                            </button>
                        </div>
                    </section>

                    <section className="mb-16 text-center select-text">
                        <div className="w-12 h-px bg-[var(--bcg-gold)] mx-auto mb-6"></div>
                        <p className="text-xl md:text-2xl font-serif-title font-bold leading-relaxed">"{theme.wrapUp}"</p>
                        <div className="w-12 h-px bg-[var(--bcg-gold)] mx-auto mt-6"></div>
                    </section>

                    {/* Quiz Block */}
                    <section className="mb-16 border border-[var(--bcg-border)] p-4 sm:p-8 bg-black/5 dark:bg-white/5 ui-protect">
                        <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-8 border-b border-[var(--bcg-border)] pb-4 gap-2">
                            <h3 className="text-sm font-bold tracking-widest uppercase text-[var(--bcg-gold)]">{t.btn.check}</h3>
                            <div className="flex items-center gap-4 text-[10px] font-bold tracking-widest opacity-60" aria-hidden="true">
                                {/* Format: 答對/已答/總數 */}
                                <span>Corr/Ans/Tot: {correctQuizInTheme}/{answeredQuizInTheme}/{totalQuizInTheme}</span>
                                <span className="hidden sm:inline">|</span>
                                <span>View: {quizPage * 2 + 1}-{Math.min((quizPage + 1) * 2, totalQuizInTheme)} / {totalQuizInTheme}</span>
                            </div>
                        </div>

                        <div className="space-y-12 select-text">
                            {visibleQuizzes.map((q, qIndex) => {
                                const globalIndex = quizPage * 2 + qIndex;
                                const answeredIdx = localQuizState[globalIndex];
                                const isCorrect = answeredIdx !== undefined && answeredIdx === q.ans;

                                return (
                                    <div key={globalIndex}>
                                        <h4 className="text-lg font-serif-title font-bold mb-6">
                                            <span className="text-[var(--bcg-gold)] mr-2" aria-hidden="true">Q{globalIndex + 1}.</span>{q.q}
                                        </h4>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            {q.opts.map((opt, oIndex) => {
                                                let btnClass = "p-4 text-sm text-left font-medium transition-all border ";
                                                if (answeredIdx === undefined) {
                                                    btnClass += "border-[var(--bcg-border)] hover:border-[var(--bcg-gold)] hover:bg-[var(--bcg-gold)]/10";
                                                } else {
                                                    if (oIndex === q.ans) btnClass += "border-[var(--bcg-green)] bg-[var(--bcg-green)]/10 text-[var(--bcg-green)]"; 
                                                    else if (oIndex === answeredIdx) btnClass += "border-[var(--bcg-red)] bg-[var(--bcg-red)]/10 text-[var(--bcg-red)]"; 
                                                    else btnClass += "border-[var(--bcg-border)] opacity-30"; 
                                                }
                                                return (
                                                    <button key={oIndex} onClick={() => handleQuizAnswer(qIndex, oIndex)} className={btnClass} disabled={answeredIdx !== undefined}>
                                                        <span className="inline-block w-6 font-bold opacity-50" aria-hidden="true">{String.fromCharCode(65 + oIndex)}.</span> {opt}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                        {answeredIdx !== undefined && (
                                            <div className={`mt-4 pl-4 border-l-4 py-2 text-sm font-medium animate-fade ${isCorrect ? 'border-[var(--bcg-green)] text-[var(--bcg-green)]' : 'border-[var(--bcg-red)] text-[var(--bcg-red)]'}`}>
                                                <div className="font-bold uppercase text-[10px] tracking-widest mb-1">{isCorrect ? (lang==='EN'?'Excellent':'觀念正確，幹得好') : (lang==='EN'?'Review Required':'需要重新複習')}</div>
                                                {q.feedback}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                        <div className="flex justify-end mt-10 space-x-3 ui-protect" aria-hidden="true">
                            <button onClick={resetQuiz} className="px-5 py-2 border border-[var(--bcg-border)] text-[10px] font-bold tracking-widest uppercase hover:bg-black/5 transition">{t.btn.retry}</button>
                            <button onClick={() => setQuizPage((quizPage + 1) % Math.ceil(totalQuizInTheme / 2))} className="px-5 py-2 bg-[var(--bcg-primary)] text-white text-[10px] font-bold tracking-widest uppercase hover:bg-[var(--bcg-accent)] transition border border-[var(--bcg-gold)]">
                                {t.btn.nextQuiz}
                            </button>
                        </div>
                    </section>

                    <div className="flex flex-col sm:flex-row items-center justify-between pt-6 border-t border-[var(--bcg-border)] ui-protect gap-4" aria-hidden="true">
                        <button onClick={onPrev} className="flex items-center space-x-2 text-[10px] font-bold tracking-widest uppercase hover:text-[var(--bcg-gold)] transition w-full sm:w-auto justify-center">
                            <Icon name="arrow-left" className="w-4 h-4" /><span>{t.btn.prevPage}</span>
                        </button>
                        {themeIdx < 6 && (
                            <button onClick={onNext} className="flex items-center space-x-2 text-[10px] font-bold tracking-widest uppercase hover:text-[var(--bcg-gold)] transition w-full sm:w-auto justify-center">
                                <span>{t.btn.next}</span><Icon name="arrow-right" className="w-4 h-4" />
                            </button>
                        )}
                    </div>
                </div>
            );
        };

        const PageLab = ({ t, lang, onPrev, onNext }) => {
            return (
                <div className="animate-fade pb-8 ui-protect">
                    <header className="mb-10 border-b border-[var(--bcg-border)] pb-6">
                        <div className="text-[10px] font-bold tracking-widest uppercase text-[var(--bcg-gold)] mb-4">{t.lab.kicker}</div>
                        <h1 className="text-3xl md:text-4xl font-serif-title font-bold mb-4 leading-tight">{t.lab.title}</h1>
                        <p className="text-base opacity-80 mb-4">{t.lab.desc}</p>
                    </header>

                    <div className="space-y-12">
                        <LabKraljic lang={lang} />
                        <LabEOQ lang={lang} />
                        <LabRadar lang={lang} />
                        <LabO2O lang={lang} />
                    </div>

                    <div className="flex flex-col sm:flex-row items-center justify-between pt-6 border-t border-[var(--bcg-border)] ui-protect gap-4 mt-16" aria-hidden="true">
                        <button onClick={onPrev} className="flex items-center space-x-2 text-[10px] font-bold tracking-widest uppercase hover:text-[var(--bcg-gold)] transition w-full sm:w-auto justify-center">
                            <Icon name="arrow-left" className="w-4 h-4" /><span>{t.btn.prevPage}</span>
                        </button>
                        <button onClick={onNext} className="flex items-center space-x-2 text-[10px] font-bold tracking-widest uppercase hover:text-[var(--bcg-gold)] transition w-full sm:w-auto justify-center">
                            <span>{t.btn.next}</span><Icon name="arrow-right" className="w-4 h-4" />
                        </button>
                    </div>
                </div>
            );
        };

        const PageResources = ({ t, track, onPrev, onNext }) => (
            <div className="animate-fade pb-8 ui-protect">
                <header className="mb-10 border-b border-[var(--bcg-border)] pb-6">
                    <div className="text-[10px] font-bold tracking-widest uppercase text-[var(--bcg-gold)] mb-4">{t.resources.kicker}</div>
                    <h1 className="text-3xl md:text-4xl font-serif-title font-bold mb-4 leading-tight">{t.resources.title}</h1>
                </header>
                
                <div className="border-t-2 border-[var(--bcg-primary)] dark:border-white mb-16">
                    <ul className="divide-y divide-[var(--bcg-border)]">
                        {t.resources.items.map((item, idx) => (
                            <li key={idx} className="group transition px-4 hover:bg-[var(--bcg-gold)]/10">
                                <a href={item.url} target="_blank" rel="noopener noreferrer" onClick={track} className="flex items-center gap-4 py-6 w-full cursor-pointer outline-none">
                                    <span className="text-[10px] font-bold tracking-widest opacity-30 w-6">0{idx+1}</span>
                                    <div className="flex-grow">
                                        <div className="text-[10px] font-bold uppercase tracking-widest text-[var(--bcg-gold)] mb-1">{item.source}</div>
                                        <div className="font-serif-title font-bold text-base sm:text-lg">{item.title}</div>
                                    </div>
                                    <Icon name="external-link" className="w-4 h-4 opacity-0 group-hover:opacity-100 transition-opacity text-[var(--bcg-gold)]" />
                                </a>
                            </li>
                        ))}
                    </ul>
                </div>

                <div className="flex flex-col sm:flex-row items-center justify-between pt-6 border-t border-[var(--bcg-border)] ui-protect gap-4" aria-hidden="true">
                    <button onClick={onPrev} className="flex items-center space-x-2 text-[10px] font-bold tracking-widest uppercase hover:text-[var(--bcg-gold)] transition w-full sm:w-auto justify-center">
                        <Icon name="arrow-left" className="w-4 h-4" /><span>{t.btn.prevPage}</span>
                    </button>
                    <button onClick={onNext} className="flex items-center space-x-2 text-[10px] font-bold tracking-widest uppercase hover:text-[var(--bcg-gold)] transition w-full sm:w-auto justify-center">
                        <span>{t.btn.next}</span><Icon name="arrow-right" className="w-4 h-4" />
                    </button>
                </div>
            </div>
        );

        const PageAnalytics = ({ t, lang, analytics, userInfo, setUserInfo, brand, shouldClearData, setShouldClearData, setAnalyticsState, themes, onPrev }) => {
            const totalCardsExpected = themes.reduce((acc, theme) => acc + (theme.cards ? theme.cards.length : 0), 0);
            
            const allAnsweredKeys = Object.keys(analytics.quizAnswers).length;
            const allCorrectVals = Object.values(analytics.quizAnswers).filter(v => v).length;
            const quizAcc = allAnsweredKeys > 0 ? Math.round((allCorrectVals / allAnsweredKeys) * 100) : 0;
            const sessionTime = Math.floor((Date.now() - analytics.startTime) / 1000);

            const exportCSV = () => {
                if (!userInfo.id || !userInfo.name || !userInfo.group) {
                    alert(lang === 'EN' ? "Validation Failed: Group, ID, and Name are strictly required." : "資料防護：請務必填寫組別、學號與姓名。");
                    return;
                }

                const cleanGroup = DOMPurify.sanitize(userInfo.group);
                const cleanId = DOMPurify.sanitize(userInfo.id);
                const cleanName = DOMPurify.sanitize(userInfo.name);

                const rows = [
                    ["Data Export", new Date().toLocaleString()],
                    ["Course Architecture", brand],
                    ["Group", cleanGroup],
                    ["Student ID", cleanId],
                    ["Name", cleanName],
                    ["", ""],
                    ["Macro Metric", "Value"],
                    ["Total Interactions", analytics.interactions],
                    ["Session Time (sec)", sessionTime],
                    ["Flashcards Explored", `${analytics.cardsFlipped.size} / ${totalCardsExpected}`],
                    ["Quiz Accuracy", `${allCorrectVals} / ${allAnsweredKeys} (${quizAcc}%)`],
                    ["", ""],
                    ["Module Breakdown", "Time (s)", "Cards (Flipped/Shown/Total)", "Quiz (Correct/Ans/Total)"]
                ];

                themes.forEach((theme, i) => {
                    const themeIdx = i + 1;
                    const totalCards = theme.cards ? theme.cards.length : 0;
                    const totalQuizzes = theme.quiz ? theme.quiz.length : 0;
                    
                    const shownCards = Array.from(analytics.cardsShown).filter(id => id.startsWith(`${themeIdx}-`)).length;
                    const flippedCards = Array.from(analytics.cardsFlipped).filter(id => id.startsWith(`${themeIdx}-`)).length;
                    
                    const moduleQuizAnswers = Object.entries(analytics.quizAnswers).filter(([id]) => id.startsWith(`${themeIdx}-`));
                    const answeredQuizzes = moduleQuizAnswers.length;
                    const correctQuizzes = moduleQuizAnswers.filter(([_, isC]) => isC).length;
                    const timeSec = analytics.pageTimes[themeIdx] || 0;

                    rows.push([
                        `M${themeIdx}: ${theme.title}`,
                        timeSec,
                        `${flippedCards}/${shownCards}/${totalCards}`,
                        `${correctQuizzes}/${answeredQuizzes}/${totalQuizzes}`
                    ]);
                });

                // 使用 Blob 確保支援萬國碼 (UTF-8) 且加入 BOM 頭以防 Excel 亂碼
                const csvContent = "\uFEFF" + rows.map(e => e.join(",")).join("\n");
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement("a");
                const dateStr = new Date().toISOString().split('T')[0].replace(/-/g, '');
                
                link.setAttribute("href", url);
                link.setAttribute("download", `${brand}_${cleanGroup}_${cleanId}_${cleanName}_${dateStr}.csv`);
                document.body.appendChild(link);
                link.click();
                
                // 清除暫存連結
                document.body.removeChild(link);
                URL.revokeObjectURL(url);

                if (shouldClearData) {
                    setAnalyticsState({ startTime: Date.now(), pageTimes: {}, interactions: 0, cardsShown: new Set(), cardsFlipped: new Set(), quizAnswers: {} });
                }
            };

            const groups = ["G1","G2","G3","G4","G5","G6","G7","G8","G9","G10","G11","G12","Others"];

            return (
                <div className="animate-fade pb-8 ui-protect">
                    <header className="mb-10 border-b border-[var(--bcg-border)] pb-6">
                        <div className="text-[10px] font-bold tracking-widest uppercase text-[var(--bcg-gold)] mb-4">{t.analytics.kicker}</div>
                        <h1 className="text-3xl md:text-4xl font-serif-title font-bold mb-4 leading-tight">{t.analytics.title}</h1>
                    </header>
                    
                    <div className="grid grid-cols-1 lg:grid-cols-5 gap-12 mb-16">
                        {/* Diagnostics Section (Left Side) */}
                        <div className="lg:col-span-3">
                            <h3 className="text-sm font-bold tracking-widest uppercase border-b border-[var(--bcg-border)] pb-2 mb-6 text-[var(--bcg-gold)]">
                                {lang === 'EN' ? 'Session Diagnostics' : '學習歷程總診斷'}
                            </h3>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-px bg-[var(--bcg-border)] border border-[var(--bcg-border)] mb-8">
                                <div className="p-6 bg-black/5 dark:bg-white/5">
                                    <div className="text-4xl font-serif-title font-bold text-[var(--bcg-gold)] mb-2 break-all">{analytics.interactions}</div>
                                    <div className="text-[10px] font-bold tracking-widest uppercase opacity-50">{t.analytics.interactions}</div>
                                </div>
                                <div className="p-6 bg-black/5 dark:bg-white/5">
                                    <div className="text-4xl font-serif-title font-bold text-[var(--bcg-accent)] mb-2 break-all">{sessionTime}s</div>
                                    <div className="text-[10px] font-bold tracking-widest uppercase opacity-50">{t.analytics.time}</div>
                                </div>
                                <div className="p-6 bg-black/5 dark:bg-white/5">
                                    <div className="text-4xl font-serif-title font-bold mb-2 break-all">{quizAcc}%</div>
                                    <div className="text-[10px] font-bold tracking-widest uppercase opacity-50">{t.analytics.quiz}</div>
                                </div>
                                <div className="p-6 bg-black/5 dark:bg-white/5">
                                    <div className="text-4xl font-serif-title font-bold mb-2 break-all">{analytics.cardsFlipped.size} <span className="text-lg opacity-50">/ {totalCardsExpected}</span></div>
                                    <div className="text-[10px] font-bold tracking-widest uppercase opacity-50">{t.analytics.cards}</div>
                                </div>
                            </div>

                            {/* Detailed Module Specific Analytics Breakdown */}
                            <div className="bg-black/5 dark:bg-white/5 border border-[var(--bcg-border)] p-6">
                                <h4 className="text-xs font-bold tracking-widest uppercase mb-6 text-[var(--bcg-gold)]">
                                    {t.analytics.modDetails}
                               </h4>
                               <div className="space-y-3">
                                   {themes.map((theme, i) => {
                                        const themeIdx = i + 1;
                                        const totalCards = theme.cards ? theme.cards.length : 0;
                                        const totalQuizzes = theme.quiz ? theme.quiz.length : 0;
                                        
                                        const shownCards = Array.from(analytics.cardsShown).filter(id => id.startsWith(`${themeIdx}-`)).length;
                                        const flippedCards = Array.from(analytics.cardsFlipped).filter(id => id.startsWith(`${themeIdx}-`)).length;
                                        
                                        const moduleQuizAnswers = Object.entries(analytics.quizAnswers).filter(([id]) => id.startsWith(`${themeIdx}-`));
                                        const answeredQuizzes = moduleQuizAnswers.length;
                                        const correctQuizzes = moduleQuizAnswers.filter(([_, isC]) => isC).length;
                                        const timeSec = analytics.pageTimes[themeIdx] || 0;

                                        return (
                                            <div key={themeIdx} className="bg-white/5 border border-[var(--bcg-border)] p-4 flex flex-col md:flex-row justify-between md:items-center gap-4 transition hover:border-[var(--bcg-gold)]">
                                                <div className="md:w-1/3">
                                                    <span className="text-[10px] font-bold opacity-50 block mb-1">M{themeIdx}</span>
                                                    <span className="text-sm font-bold text-[var(--bcg-gold)]">{theme.title}</span>
                                                </div>
                                                <div className="grid grid-cols-3 gap-4 md:w-2/3 text-center">
                                                    <div>
                                                        <div className="text-[10px] font-bold uppercase opacity-50 mb-1">{t.analytics.modTime}</div>
                                                        <div className="text-sm font-bold">{timeSec}</div>
                                                    </div>
                                                    <div>
                                                        <div className="text-[10px] font-bold uppercase opacity-50 mb-1">{t.analytics.modCards}</div>
                                                        <div className="text-sm font-bold">{flippedCards} / {shownCards} / {totalCards}</div>
                                                    </div>
                                                    <div>
                                                        <div className="text-[10px] font-bold uppercase opacity-50 mb-1">{t.analytics.modQuiz}</div>
                                                        <div className={`text-sm font-bold ${correctQuizzes === totalQuizzes && totalQuizzes > 0 ? 'text-[var(--bcg-green)]' : ''}`}>
                                                            {correctQuizzes} / {answeredQuizzes} / {totalQuizzes}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                   })}
                               </div>
                            </div>
                        </div>

                        {/* Export & Profile Section (Right Side) */}
                        <div className="lg:col-span-2 space-y-6" aria-hidden="true">
                            <div className="bg-black/5 dark:bg-white/5 border border-[var(--bcg-border)] p-6 sticky top-24">
                                <h3 className="text-sm font-bold tracking-widest uppercase border-b border-[var(--bcg-border)] pb-2 mb-6 text-[var(--bcg-gold)]">
                                    {lang === 'EN' ? 'Student Profile' : '學生基本資料'}
                                </h3>
                                <div className="space-y-6 mb-8">
                                    <div>
                                        <label className="block text-[10px] font-bold tracking-widest uppercase opacity-60 mb-2">{t.analytics.group} *</label>
                                        <select value={userInfo.group} onChange={e => setUserInfo({...userInfo, group: e.target.value})} className="w-full bg-transparent border-b border-[var(--bcg-border)] py-2 outline-none focus:border-[var(--bcg-gold)] transition text-sm font-medium">
                                            {groups.map(g => <option key={g} value={g} className="text-black dark:text-black">{g}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-bold tracking-widest uppercase opacity-60 mb-2">{t.analytics.studentId} *</label>
                                        <input type="text" maxLength="20" placeholder="e.g. 113212599" value={userInfo.id} onChange={e => setUserInfo({...userInfo, id: e.target.value})} className="w-full bg-transparent border-b border-[var(--bcg-border)] py-2 outline-none focus:border-[var(--bcg-gold)] transition text-sm font-medium" />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-bold tracking-widest uppercase opacity-60 mb-2">{t.analytics.name} *</label>
                                        <input type="text" maxLength="50" placeholder="e.g. Shihmin Lo" value={userInfo.name} onChange={e => setUserInfo({...userInfo, name: e.target.value})} className="w-full bg-transparent border-b border-[var(--bcg-border)] py-2 outline-none focus:border-[var(--bcg-gold)] transition text-sm font-medium" />
                                    </div>
                                </div>

                                <div className="space-y-4 pt-4 border-t border-[var(--bcg-border)]">
                                    <label className="flex items-center space-x-3 cursor-pointer opacity-70 hover:opacity-100 transition">
                                        <input type="checkbox" checked={shouldClearData} onChange={e => setShouldClearData(e.target.checked)} className="w-4 h-4 accent-[var(--bcg-gold)] rounded-none" />
                                        <span className="text-[10px] font-bold tracking-widest uppercase">{t.analytics.clear}</span>
                                    </label>
                                    <button onClick={exportCSV} className="w-full py-4 bg-[var(--bcg-primary)] text-white text-[10px] font-bold tracking-widest uppercase hover:bg-[var(--bcg-accent)] transition border border-[var(--bcg-gold)] flex items-center justify-center gap-2 shadow-lg">
                                        <Icon name="download" className="w-4 h-4" /> {t.analytics.export}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="flex flex-col sm:flex-row items-center justify-between pt-6 border-t border-[var(--bcg-border)] ui-protect gap-4" aria-hidden="true">
                        <button onClick={onPrev} className="flex items-center space-x-2 text-[10px] font-bold tracking-widest uppercase hover:text-[var(--bcg-gold)] transition w-full sm:w-auto justify-center">
                            <Icon name="arrow-left" className="w-4 h-4" /><span>{t.btn.prevPage}</span>
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
