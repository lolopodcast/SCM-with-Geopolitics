                        desc: "並非所有供應商都處於同等地位，統一對待將導致災難性的效率低落。Peter Kraljic 的採購組合矩陣是現代採購策略的決定性工具。它根據「利潤影響」與「供應風險」兩個維度將採購項目分類。透過將項目映射到四個象限——槓桿、策略、瓶頸與非關鍵——組織可以適當地調整其採購行為。\n\n「策略性項目」（高影響、高風險）需要深度、長期的夥伴關係，共同研發以及高層級的對接。相反，「非關鍵項目」（低影響、低風險）應該高度自動化，以大幅降低交易與行政成本。最具挑戰性的是「瓶頸項目」——利潤影響低但供應風險極高的零組件，例如特定規格的晶片。針對這類項目，策略必須轉向「產量保障」、維持安全庫存，並緊急尋找替代設計或供應商。\n\n台灣的科技巨頭（如鴻海、廣達）持續利用此矩陣來應對晶片短缺與科技戰的干擾。透過擺脫單一來源依賴並採用多區域佈局，他們將採購從被動的買賣功能轉變為主動的風險管理武器。",

                        overview: "設計全通路銷售策略並無縫整合實體與數位零售。",
                        highlights: ["全通路策略", "O2O 整合", "BOPIS 模式", "智慧促銷"],
                        desc: "零售產業的版圖已從孤立的銷售管道，不可逆轉地轉向整合的「全通路」(Omni-channel) 生態系。對中小企業而言，決定採用直營 (D2C)、經銷商或批發模式，高度取決於產品屬性、目標客群與成本限制。然而，現今真正的競爭優勢在於 O2O（線上線下整合）。\n\nO2O 最典型的範例是 BOPIS 模式（線上下單，線下取貨）。此策略不僅滿足了消費者對即時獲得產品的渴望並省下運費，更能將關鍵的客流量引導至實體店面，創造追加銷售 (Up-selling) 的機會。AI 在此扮演核心角色，透過分析 Google Analytics 與顧客購買歷史，在取貨過程中提供個人化的商品推薦。\n\n此外，AI 能透過智慧促銷策略優化庫存週轉率。與其單純依賴會破壞毛利的降價打折，AI 能建議最佳的「聯合促銷」(Bundling) 或目標贈品策略，在不貶低品牌價值的情況下清除滯銷庫存。掌握這些全通路策略，能確保為顧客提供無縫且順暢的消費旅程。",
                        wrapUp: "成功的零售管理能將數位便利性與實體體驗無縫融合，並由資料驅動的個人化行銷作為後盾。",
                        cards: [
                            { term: "O2O 模式", def: "線上線下整合：將數位電商通路與實體店面體驗緊密結合的營運模式。" },
                            { term: "BOPIS", def: "線上下單，線下取貨：帶動實體店面人流的核心 O2O 策略。" },
                            { term: "全通路 (Omni)", def: "跨越所有線上線下銷售平台，提供顧客一致、無斷點且無縫的消費體驗。" },
                            { term: "聯合促銷 (Bundling)", def: "將產品策略性綁定銷售，以在不砍殺毛利的情況下加速庫存週轉。" }
                        ],
                        quiz: [
                            { q: "在現代零售中，BOPIS 代表什麼意思？", opts: ["Buy One, Pay In Store", "Buy Online, Pick Up In Store (線上下單線下取貨)", "Best Online Price In Store", "Bring Own Product In Store"], ans: 1, feedback: "正確。這是帶動實體店面流量與提升體驗的關鍵 O2O 策略。" },
                            { q: "對零售商而言，BOPIS 模式的主要戰略好處之一是什麼？", opts: ["大幅增加物流運輸成本", "強迫顧客拉長等待時間", "引導實體客流量並創造追加銷售 (Up-selling) 的機會", "減少品牌網站的整體流量"], ans: 2, feedback: "正確。進入實體店的顧客極可能會受吸引而購買額外的商品。" },
                            { q: "為了保護品牌價值，除了單純打折降價，另一種清除庫存的較佳方法是？", opts: ["將商品下架隱藏", "聯合促銷 / 組合包裝 (Bundling)", "反向提高產品售價", "停止所有的行銷廣告"], ans: 1, feedback: "正確。組合促銷能在不直接砍價的情況下，增加顧客的價值感知。" },
                            { q: "何謂真正的「全通路」(Omni-channel) 策略？", opts: ["企業僅專注於數位線上的銷售", "提供各通路獨立且互不相通的顧客體驗", "跨越所有接觸點，提供統一、一致且無縫的品牌體驗", "全面淘汰實體店面以降低成本"], ans: 2, feedback: "正確。核心目標是讓顧客的消費旅程沒有任何摩擦與斷點。" }
                        ]
                    }
                ],
                lab: { title: "策略實驗室", kicker: "7. INTERACTIVE MODULES", items: ["Kraljic 策略分類器", "動態 EOQ 計算器", "PESTEL 風險矩陣", "供應鏈韌性評分卡"] },
                resources: { title: "洞察與資源", kicker: "8. EXTERNAL LITERATURE", items: ["Financial Times: Ukraine crisis energy impact", "Reuters: China-ASEAN trade dynamics", "Bloomberg: Supply Chain Resilience Reports", "Focus Taiwan: Tariff impacts on SMEs"] },
                analytics: { title: "數據儀表板", kicker: "9. PERFORMANCE METRICS", group: "參與組別", studentId: "學號 / 識別碼", name: "姓名", export: "匯出分析報告 (CSV)", interactions: "互動次數", time: "系統停留 (秒)", clear: "匯出後清除本地數據" },
                footer: { top: "回到頂部", architect: "Architect: Prof. Shihmin Lo", copy: "2025 SCM Global Strategy. 版權所有" },
                btn: { next: "進入下一個模組", retry: "重新測試", prevPage: "返回上一節", nextPage: "前往下一節", check: "知識驗證" }
            }
        };

        // ==========================================
        // 3. MAIN REACT APP COMPONENT
        // ==========================================
        const Icon = ({ name, className }) => {
            const spanRef = useRef(null);
            useEffect(() => {
                if (spanRef.current && window.lucide) {
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    if (className) i.className = className;
                    spanRef.current.innerHTML = '';
                    spanRef.current.appendChild(i);
                    lucide.createIcons({ root: spanRef.current });
                }
            }, [name, className]);
            return <span ref={spanRef} className="inline-flex items-center justify-center"></span>;
        };

        const App = () => {
            const [lang, setLang] = useState('ZH');
            const [isDark, setIsDark] = useState(true);
            const [currentPage, setCurrentPage] = useState(0); 
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            
            // Analytics State
            const [analytics, setAnalytics] = useState({
                startTime: Date.now(),
                pageTimes: {},
                interactions: 0,
                cardUsage: 0,
                quizScore: 0,
                quizTotal: 0
            });
            const [userInfo, setUserInfo] = useState({ group: 'G1', id: '', name: '' });
            const [shouldClearData, setShouldClearData] = useState(false);

            const t = CONTENT[lang];

            // Setup Theme
            useEffect(() => {
                document.body.className = `${isDark ? 'dark' : 'light'} select-none`;
            }, [isDark]);

            // Page Timer
            useEffect(() => {
                const timer = setInterval(() => {
                    setAnalytics(prev => ({
                        ...prev,
                        pageTimes: { ...prev.pageTimes, [currentPage]: (prev.pageTimes[currentPage] || 0) + 1 }
                    }));
                }, 1000);
                return () => clearInterval(timer);
            }, [currentPage]);

            // Interaction Handler
            const trackInteraction = () => setAnalytics(prev => ({ ...prev, interactions: prev.interactions + 1 }));

            // TTS Engine (With Browser Safety Checks)
            const [isSpeaking, setIsSpeaking] = useState(false);
            const synth = typeof window !== 'undefined' ? window.speechSynthesis : null;
            
            const speak = useCallback((text) => {
                if (!synth) return;
                synth.cancel();
                if (!text) return;
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = lang === 'EN' ? 'en-GB' : 'zh-TW';
                
                const voices = synth.getVoices();
                if (lang === 'EN') {
                    msg.voice = voices.find(v => v.name.includes('Google UK English Male')) || voices.find(v => v.lang === 'en-GB') || voices[0];
                } else {
                    msg.voice = voices.find(v => v.name.includes('Yating')) || voices.find(v => v.lang === 'zh-TW') || voices[0];
                }

                msg.onend = () => setIsSpeaking(false);
                msg.onerror = () => setIsSpeaking(false);

                synth.speak(msg);
                setIsSpeaking(true);
                trackInteraction();
            }, [lang, synth]);

            const togglePlayPause = () => {
                if (!synth) return;
                if (synth.speaking) {
                    if (synth.paused) { synth.resume(); setIsSpeaking(true); } 
                    else { synth.pause(); setIsSpeaking(false); }
                } else {
                    const contentDiv = document.getElementById('readable-content');
                    if (contentDiv) speak(contentDiv.innerText);
                }
            };
            
            const stopVoice = () => { 
                if (synth) { 
                    synth.cancel(); 
                    setIsSpeaking(false); 
                } 
            };

            const scrollToTop = () => { window.scrollTo({ top: 0, behavior: 'smooth' }); trackInteraction(); };

            const navigateTo = (idx) => {
                stopVoice();
                setCurrentPage(idx);
                setIsMenuOpen(false);
                scrollToTop();
            };

            return (
                <div className="min-h-screen flex flex-col justify-between">
                    {/* ===== HEADER (h-16) - Sharp, Minimalist ===== */}
                    <header className={`fixed top-0 w-full h-16 z-50 flex items-center justify-between px-6 lg:px-12 border-b ${isDark ? 'bg-[var(--bcg-gray-dark)]/95 border-white/10' : 'bg-white/95 border-black/10'} backdrop-blur-md`}>
                        {/* Left */}
                        <div className="flex items-center space-x-4">
                            <button onClick={() => { setIsMenuOpen(!isMenuOpen); trackInteraction(); }} className="p-1 hover:opacity-70 transition">
                                <Icon name={isMenuOpen ? "x" : "menu"} className="w-5 h-5" />
                            </button>
                            <div className="flex items-center cursor-pointer group" onClick={() => scrollToTop()}>
                                <div className="w-6 h-6 bg-[var(--bcg-accent)] flex items-center justify-center rounded-sm">
                                    <span className="text-white font-serif-title font-bold text-sm">S</span>
                                </div>
                                <span className="ml-3 font-serif-title font-bold text-sm tracking-widest uppercase hidden sm:block opacity-90">{t.brand}</span>
                            </div>
                        </div>

                        {/* Right */}
                        <div className="flex items-center space-x-4 lg:space-x-6 text-sm">
                            {/* Voice Controls */}
                            <div className="flex items-center space-x-3 border-r border-[var(--bcg-border)] pr-4 lg:pr-6">
                                <button onClick={togglePlayPause} className={`transition flex items-center gap-1.5 uppercase text-[10px] font-bold tracking-widest ${isSpeaking ? 'text-[var(--bcg-accent)]' : 'hover:opacity-70'}`}>
                                    <Icon name={isSpeaking && (!synth || !synth.paused) ? "pause" : "play"} className="w-4 h-4" />
                                    <span className="hidden md:block">Audio</span>
                                </button>
                                <button onClick={stopVoice} className="hover:text-[var(--bcg-red)] transition">
                                    <Icon name="square" className="w-3.5 h-3.5 fill-current" />
                                </button>
                            </div>

                            {/* Bilingual Toggle */}
                            <button 
                                onClick={() => { setLang(lang === 'EN' ? 'ZH' : 'EN'); trackInteraction(); stopVoice(); }}
                                className="text-[10px] font-bold tracking-widest uppercase hover:text-[var(--bcg-gold)] transition"
                            >
                                {lang === 'EN' ? '繁中' : 'EN'}
                            </button>

                            {/* Theme Toggle */}
                            <button onClick={() => { setIsDark(!isDark); trackInteraction(); }} className="hover:opacity-70 transition">
                                <Icon name={isDark ? "sun" : "moon"} className="w-4 h-4" />
                            </button>
                        </div>
                    </header>

                    {/* ===== SIDEBAR MENU - Corporate Slide-out ===== */}
                    {isMenuOpen && (
                        <div className="fixed inset-0 z-40 bg-black/40 backdrop-blur-sm" onClick={() => setIsMenuOpen(false)}>
                            <div className={`fixed top-0 left-0 h-full w-80 shadow-2xl overflow-y-auto transform transition-transform ${isDark ? 'bg-[#15191C] border-r border-white/5' : 'bg-[#FAFAFA] border-r border-black/5'}`} onClick={e => e.stopPropagation()}>
                                <div className="p-8 border-b border-[var(--bcg-border)]">
                                    <h2 className="text-[10px] font-bold tracking-widest uppercase opacity-60 mb-2">Navigation</h2>
                                    <div className="font-serif-title font-bold text-xl">{t.brand}</div>
                                </div>
                                <nav className="p-4 space-y-1">
                                    {t.nav.map((item, idx) => (
                                        <button 
                                            key={idx} onClick={() => navigateTo(idx)}
                                            className={`w-full flex items-center px-4 py-3 text-left text-sm transition-all rounded-sm
                                                ${currentPage === idx ? 'bg-[var(--bcg-primary)] text-white font-bold' : 'hover:bg-black/5 dark:hover:bg-white/5 font-medium'}
                                            `}
                                        >
                                            <span className={`w-6 text-xs font-bold ${currentPage === idx ? 'text-[var(--bcg-gold)]' : 'opacity-40'}`}>
                                                {idx < 10 ? `0${idx}` : idx}
                                            </span>
                                            {item.split('. ')[1] || item}
                                        </button>
                                    ))}
                                </nav>
                            </div>
                        </div>
                    )}

                    {/* ===== MAIN CONTENT ===== */}
                    <main id="readable-content" className="pt-32 pb-24 px-6 lg:px-12 max-w-4xl mx-auto w-full flex-grow">
                        {currentPage === 0 && <PageSummary t={t} navigateTo={navigateTo} />}
                        
                        {/* Theme rendering is now completely safe from ReferenceErrors and guarantees state reset via Key injection */}
                        {currentPage >= 1 && currentPage <= 6 && (
                            <PageTheme 
                                key={`theme-${currentPage}`} 
                                theme={t.themes[currentPage - 1]} 
                                t={t} 
                                lang={lang} 
                                setAnalytics={setAnalytics} 
                                onPrev={() => navigateTo(currentPage - 1)} 
                                onNext={() => navigateTo(currentPage + 1)} 
                            />
                        )}
                        
                        {currentPage === 7 && <PageLab t={t} />}
                        {currentPage === 8 && <PageResources t={t} />}
                        {currentPage === 9 && <PageAnalytics t={t} lang={lang} analytics={analytics} userInfo={userInfo} setUserInfo={setUserInfo} brand={t.brand} shouldClearData={shouldClearData} setShouldClearData={setShouldClearData} setAnalyticsState={setAnalytics} />}
                    </main>

                    {/* ===== FOOTER (h-8 = 1/2 of h-16) - Strictly 32px ===== */}
                    <footer className={`fixed bottom-0 w-full h-8 z-40 flex items-center justify-between px-6 lg:px-12 text-[10px] font-bold tracking-widest uppercase border-t ${isDark ? 'bg-[var(--bcg-gray-dark)] border-white/10 text-white/50' : 'bg-white border-black/10 text-black/50'}`}>
                        <div>{t.footer.copy}</div>
                        <div className="flex items-center space-x-8">
                            <a href="https://www.ibs.ncnu.edu.tw/index.php/faculty/tenured-professor/299-smlo" target="_blank" className="hover:text-[var(--bcg-accent)] transition-colors">
                                {t.footer.architect}
                            </a>
                            <button onClick={scrollToTop} className="flex items-center space-x-1.5 hover:text-[var(--bcg-gold)] transition-colors">
                                <span>{t.footer.top}</span>
                                <Icon name="arrow-up" className="w-3 h-3" />
                            </button>
                        </div>
                    </footer>
                </div>
            );
        };

        // --- SUB-COMPONENTS ---

        const PageSummary = ({ t, navigateTo }) => (
            <div className="animate-fade">
                <div className="text-[10px] font-bold tracking-widest uppercase text-[var(--bcg-gold)] mb-4">{t.summary.kicker}</div>
                <h1 className="text-4xl md:text-5xl font-serif-title font-bold mb-10 leading-tight">{t.summary.title}</h1>
                
                {/* Editorial Drop-cap / Border style */}
                <div className="pl-6 border-l-2 border-[var(--bcg-accent)] mb-16">
                    <p className="text-base md:text-lg leading-relaxed whitespace-pre-line opacity-90 font-light">{t.summary.desc}</p>
                </div>
                
                {/* Structured Grid */}
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-px bg-[var(--bcg-border)] border border-[var(--bcg-border)]">
                    {t.nav.slice(1).map((item, idx) => (
                        <button key={idx} onClick={() => navigateTo(idx + 1)} className="group p-8 bg-[var(--bcg-gray-dark)] hover:bg-[var(--bcg-primary)] text-left transition-colors relative overflow-hidden h-full flex flex-col justify-between">
                            <div className="absolute top-0 right-0 p-4 text-4xl font-serif-title font-bold opacity-10 group-hover:opacity-20 transition-opacity">
                                0{idx + 1}
                            </div>
                            <span className="text-[10px] font-bold tracking-widest uppercase text-[var(--bcg-gold)] mb-3 block">Module 0{idx + 1}</span>
                            <h3 className="font-serif-title font-bold text-lg md:text-xl text-white relative z-10">{item.split('. ')[1] || item}</h3>
                        </button>
                    ))}
                </div>
            </div>
        );

        const PageTheme = ({ theme, t, lang, setAnalytics, onPrev, onNext }) => {
            const [cardPage, setCardPage] = useState(0);
            const [flippedCards, setFlippedCards] = useState({});
            const [quizPage, setQuizPage] = useState(0);
            const [quizAnswers, setQuizAnswers] = useState({});
            const [quizFeedback, setQuizFeedback] = useState({});

            const safeCards = theme.cards || [];
            const visibleCards = safeCards.slice(cardPage * 2, cardPage * 2 + 2);
            
            const safeQuizzes = theme.quiz || [];
            const visibleQuizzes = safeQuizzes.slice(quizPage * 2, quizPage * 2 + 2);

            const handleFlip = (globalIndex) => {
                setFlippedCards(prev => ({ ...prev, [globalIndex]: !prev[globalIndex] }));
                setAnalytics(prev => ({ ...prev, interactions: prev.interactions + 1, cardUsage: prev.cardUsage + 1 }));
            };

            const handleQuizAnswer = (qIndex, oIndex) => {
                const globalIndex = quizPage * 2 + qIndex;
                if (quizAnswers[globalIndex] !== undefined) return; 
                const isCorrect = safeQuizzes[globalIndex].ans === oIndex;
                setQuizAnswers(prev => ({ ...prev, [globalIndex]: oIndex }));
                setQuizFeedback(prev => ({ ...prev, [globalIndex]: { correct: isCorrect, msg: safeQuizzes[globalIndex].feedback } }));
                setAnalytics(prev => ({
                    ...prev, interactions: prev.interactions + 1, quizTotal: prev.quizTotal + 1, quizScore: prev.quizScore + (isCorrect ? 1 : 0)
                }));
            };

            const resetQuiz = () => {
                setQuizAnswers({}); setQuizFeedback({}); setQuizPage(0);
                setAnalytics(prev => ({ ...prev, interactions: prev.interactions + 1 }));
            };

            return (
                <div className="animate-fade pb-12">
                    {/* Header */}
                    <header className="mb-12 border-b border-[var(--bcg-border)] pb-8">
                        <div className="text-[10px] font-bold tracking-widest uppercase text-[var(--bcg-gold)] mb-4">{theme.kicker}</div>
                        <h1 className="text-3xl md:text-4xl font-serif-title font-bold mb-6 leading-tight">{theme.title}</h1>
                        <p className="text-lg font-serif-title italic opacity-80">{theme.overview}</p>
                    </header>

                    {/* Highlights Tags - Flat, Sharp */}
                    <div className="flex flex-wrap gap-2 mb-10">
                        {(theme.highlights || []).map((h, i) => (
                            <span key={i} className="px-3 py-1 bg-black/5 dark:bg-white/5 border border-[var(--bcg-border)] text-[10px] font-bold tracking-widest uppercase rounded-sm">{h}</span>
                        ))}
                    </div>

                    {/* Detailed Description & Image Placeholder */}
                    <section className="mb-16">
                        <div className="text-base leading-relaxed opacity-90 whitespace-pre-line font-light mb-8">
                            {theme.desc}
                        </div>
                        <div className="border border-[var(--bcg-border)] bg-black/5 dark:bg-white/5 p-8 flex flex-col items-center justify-center text-center min-h-[200px]">
                            <Icon name="image" className="w-8 h-8 opacity-20 mb-3" />
                            <span className="text-[10px] font-bold tracking-widest uppercase opacity-50 mb-1">
                                [ {lang === 'EN' ? 'Exhibit' : '圖表'} / {theme.kicker ? theme.kicker.split('.')[0] : ''} ]
                            </span>
                            <span className="text-sm font-serif-title italic opacity-70">
                                [ {lang === 'EN' ? 'Image of' : '圖片預留：'} {theme.title} ]
                            </span>
                        </div>
                    </section>

                    {/* Flip Cards (Show 2) - Sharp Editorial Style */}
                    <section className="mb-16">
                        <div className="flex items-center justify-between mb-6 border-b-2 border-black dark:border-white pb-2">
                            <h3 className="text-sm font-bold tracking-widest uppercase">Key Concepts</h3>
                            <span className="text-[10px] font-bold tracking-widest opacity-50">{cardPage * 2 + 1}-{Math.min((cardPage + 1) * 2, safeCards.length)} / {safeCards.length}</span>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {visibleCards.map((card, idx) => {
                                const globalIndex = cardPage * 2 + idx;
                                const flipped = !!flippedCards[globalIndex];
                                return (
                                    <div key={globalIndex} className="perspective-1000 h-64 cursor-pointer group" onClick={() => handleFlip(globalIndex)}>
                                        <div className={`relative w-full h-full transform-style-3d flip-transition ${flipped ? 'rotate-y-180' : ''}`}>
                                            {/* Front - Deep Navy */}
                                            <div className="absolute inset-0 backface-hidden bg-[var(--bcg-primary)] text-white p-8 flex flex-col justify-between border-t-4 border-[var(--bcg-gold)]">
                                                <span className="text-[10px] font-bold tracking-widest uppercase opacity-50">Concept {globalIndex + 1}</span>
                                                <h4 className="text-2xl font-serif-title font-bold text-center group-hover:scale-105 transition-transform">{card.term}</h4>
                                                <div className="flex justify-center opacity-50"><Icon name="repeat" className="w-4 h-4" /></div>
                                            </div>
                                            {/* Back - Light/White */}
                                            <div className="absolute inset-0 backface-hidden rotate-y-180 bg-white text-black p-8 flex flex-col items-center justify-center text-center border border-[var(--bcg-border)] border-t-4 border-[var(--bcg-accent)]">
                                                <span className="text-[10px] font-bold tracking-widest uppercase text-[var(--bcg-accent)] mb-4">{card.term}</span>
                                                <p className="text-sm leading-relaxed font-medium">{card.def}</p>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                        <div className="flex justify-end mt-6 space-x-3">
                            <button onClick={() => { setFlippedCards({}); setCardPage(0); }} className="px-5 py-2 border border-[var(--bcg-border)] text-[10px] font-bold tracking-widest uppercase hover:bg-black/5 dark:hover:bg-white/5 transition">{t.btn.retry}</button>
                            <button onClick={() => { setFlippedCards({}); setCardPage((cardPage + 1) % Math.ceil(safeCards.length / 2)); }} className="px-5 py-2 bg-[var(--bcg-primary)] text-white text-[10px] font-bold tracking-widest uppercase hover:bg-opacity-90 transition">{t.btn.next}</button>
                        </div>
                    </section>

                    {/* Wrap-up */}
                    <section className="mb-16 text-center">
                        <div className="w-12 h-px bg-[var(--bcg-gold)] mx-auto mb-6"></div>
                        <p className="text-xl md:text-2xl font-serif-title font-bold leading-relaxed">"{theme.wrapUp}"</p>
                        <div className="w-12 h-px bg-[var(--bcg-gold)] mx-auto mt-6"></div>
                    </section>

                    {/* Quiz (Show 2) - Sharp Block Style */}
                    <section className="mb-16 border border-[var(--bcg-border)] p-8 md:p-10 bg-black/5 dark:bg-white/5">
                        <div className="flex items-center justify-between mb-8 border-b border-[var(--bcg-border)] pb-4">
                            <h3 className="text-sm font-bold tracking-widest uppercase">{t.btn.check}</h3>
                            <span className="text-[10px] font-bold tracking-widest opacity-50">{quizPage * 2 + 1}-{Math.min((quizPage + 1) * 2, safeQuizzes.length)} / {safeQuizzes.length}</span>
                        </div>

                        <div className="space-y-12">
                            {visibleQuizzes.map((q, qIndex) => {
                                const globalIndex = quizPage * 2 + qIndex;
                                const fb = quizFeedback[globalIndex];
                                const answeredIdx = quizAnswers[globalIndex];

                                return (
                                    <div key={globalIndex}>
                                        <h4 className="text-lg font-serif-title font-bold mb-6">
                                            <span className="text-[var(--bcg-gold)] mr-2">Q{globalIndex + 1}.</span>{q.q}
                                        </h4>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            {q.opts.map((opt, oIndex) => {
                                                let btnClass = "p-4 text-sm text-left font-medium transition-all border ";
                                                if (answeredIdx === undefined) {
                                                    btnClass += "border-[var(--bcg-border)] hover:border-[var(--bcg-primary)] hover:bg-[var(--bcg-primary)] hover:text-white";
                                                } else {
                                                    if (oIndex === q.ans) btnClass += "border-[var(--bcg-green)] bg-[var(--bcg-green)]/10 text-[var(--bcg-green)]"; 
                                                    else if (oIndex === answeredIdx) btnClass += "border-[var(--bcg-red)] bg-[var(--bcg-red)]/10 text-[var(--bcg-red)]"; 
                                                    else btnClass += "border-[var(--bcg-border)] opacity-40"; 
                                                }

                                                return (
                                                    <button key={oIndex} onClick={() => handleQuizAnswer(qIndex, oIndex)} className={btnClass} disabled={answeredIdx !== undefined}>
                                                        <span className="inline-block w-6 font-bold opacity-50">{String.fromCharCode(65 + oIndex)}.</span> {opt}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                        {fb && (
                                            <div className={`mt-4 pl-4 border-l-2 py-1 text-sm font-medium animate-fade flex items-start gap-3 ${fb.correct ? 'border-[var(--bcg-green)] text-[var(--bcg-green)]' : 'border-[var(--bcg-red)] text-[var(--bcg-red)]'}`}>
                                                <span>{fb.msg}</span>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                        <div className="flex justify-end mt-10 space-x-3">
                            <button onClick={resetQuiz} className="px-5 py-2 border border-[var(--bcg-border)] text-[10px] font-bold tracking-widest uppercase hover:bg-black/5 dark:hover:bg-white/5 transition">{t.btn.retry}</button>
                            <button onClick={() => setQuizPage((quizPage + 1) % Math.ceil(safeQuizzes.length / 2))} className="px-5 py-2 bg-black dark:bg-white text-white dark:text-black text-[10px] font-bold tracking-widest uppercase hover:opacity-80 transition">{t.btn.next}</button>
                        </div>
                    </section>

                    {/* Pagination */}
                    <div className="flex items-center justify-between pt-6 border-t border-[var(--bcg-border)]">
                        {theme.kicker && theme.kicker.startsWith("1.") ? <div></div> : (
                            <button onClick={onPrev} className="flex items-center space-x-2 text-[10px] font-bold tracking-widest uppercase hover:text-[var(--bcg-accent)] transition">
                                <Icon name="arrow-left" className="w-4 h-4" /><span>{t.btn.prevPage}</span>
                            </button>
                        )}
                        {theme.kicker && theme.kicker.startsWith("6.") ? <div></div> : (
                            <button onClick={onNext} className="flex items-center space-x-2 text-[10px] font-bold tracking-widest uppercase hover:text-[var(--bcg-accent)] transition">
                                <span>{t.btn.nextPage}</span><Icon name="arrow-right" className="w-4 h-4" />
                            </button>
                        )}
                    </div>
                </div>
            );
        };

        const PageLab = ({ t }) => (
            <div className="animate-fade">
                <div className="text-[10px] font-bold tracking-widest uppercase text-[var(--bcg-gold)] mb-4">{t.lab.kicker}</div>
                <h1 className="text-3xl md:text-4xl font-serif-title font-bold mb-10 leading-tight">{t.lab.title}</h1>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-px bg-[var(--bcg-border)] border border-[var(--bcg-border)]">
                    {t.lab.items.map((item, idx) => (
                        <div key={idx} className="p-10 bg-black/5 dark:bg-white/5 flex flex-col items-center justify-center text-center h-48">
                            <Icon name="lock" className="w-6 h-6 mb-4 opacity-30" />
                            <h3 className="text-lg font-serif-title font-bold mb-2">{item}</h3>
                            <span className="text-[10px] font-bold tracking-widest uppercase opacity-40">Module Locked</span>
                        </div>
                    ))}
                </div>
            </div>
        );

        const PageResources = ({ t }) => (
            <div className="animate-fade">
                <div className="text-[10px] font-bold tracking-widest uppercase text-[var(--bcg-gold)] mb-4">{t.resources.kicker}</div>
                <h1 className="text-3xl md:text-4xl font-serif-title font-bold mb-10 leading-tight">{t.resources.title}</h1>
                <div className="border-t-2 border-black dark:border-white">
                    <ul className="divide-y divide-[var(--bcg-border)]">
                        {t.resources.items.map((item, idx) => (
                            <li key={idx} className="flex items-center gap-4 py-6 group cursor-pointer hover:bg-black/5 dark:hover:bg-white/5 transition px-4">
                                <span className="text-[10px] font-bold tracking-widest opacity-30 w-6">0{idx+1}</span>
                                <span className="font-serif-title font-bold text-lg flex-grow">{item}</span>
                                <Icon name="arrow-up-right" className="w-5 h-5 opacity-0 group-hover:opacity-100 transition-opacity text-[var(--bcg-accent)]" />
                            </li>
                        ))}
                    </ul>
                </div>
            </div>
        );

        const PageAnalytics = ({ t, lang, analytics, userInfo, setUserInfo, brand, shouldClearData, setShouldClearData, setAnalyticsState }) => {
            const exportCSV = () => {
                if (!userInfo.id || !userInfo.name) {
                    alert(lang === 'EN' ? "Please fill in Group, ID, and Name." : "請填寫組別、學號與姓名。");
                    return;
                }

                const totalTime = Math.floor((Date.now() - analytics.startTime) / 1000);
                const accRate = analytics.quizTotal > 0 ? ((analytics.quizScore / analytics.quizTotal) * 100).toFixed(1) + '%' : '0%';

                const rows = [
                    ["Data Export", new Date().toLocaleString()],
                    ["Brand", brand],
                    ["Group", userInfo.group],
                    ["Student ID", userInfo.id],
                    ["Name", userInfo.name],
                    ["", ""],
                    ["Metric", "Value"],
                    ["Total Interactions", analytics.interactions],
                    ["Session Time (sec)", totalTime],
                    ["Flashcards Flipped", analytics.cardUsage],
                    ["Quiz Accuracy", `${analytics.quizScore}/${analytics.quizTotal} (${accRate})`],
                    ["", ""],
                    ["Page Module", "Time Spent (sec)"]
                ];

                Object.entries(analytics.pageTimes).forEach(([pid, time]) => {
                    const pageName = t.nav[pid] || `Page ${pid}`;
                    rows.push([pageName, time]);
                });

                let csvContent = "data:text/csv;charset=utf-8,\uFEFF" + rows.map(e => e.join(",")).join("\n");
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                const dateStr = new Date().toISOString().split('T')[0].replace(/-/g, '');
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `${brand}_${userInfo.group}_${userInfo.name}_${dateStr}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                if (shouldClearData) {
                    setAnalyticsState({ startTime: Date.now(), pageTimes: {}, interactions: 0, cardUsage: 0, quizScore: 0, quizTotal: 0 });
                }
            };

            const groups = ["G1","G2","G3","G4","G5","G6","G7","G8","G9","G10","G11","G12","Others"];

            return (
                <div className="animate-fade">
                    <div className="text-[10px] font-bold tracking-widest uppercase text-[var(--bcg-gold)] mb-4">{t.analytics.kicker}</div>
                    <h1 className="text-3xl md:text-4xl font-serif-title font-bold mb-10 leading-tight">{t.analytics.title}</h1>
                    
                    <div className="grid grid-cols-1 lg:grid-cols-5 gap-12">
                        {/* Profile Form */}
                        <div className="lg:col-span-2 space-y-8">
                            <h3 className="text-sm font-bold tracking-widest uppercase border-b border-[var(--bcg-border)] pb-2">User Profile</h3>
                            <div className="space-y-6">
                                <div>
                                    <label className="block text-[10px] font-bold tracking-widest uppercase opacity-60 mb-2">{t.analytics.group}</label>
                                    <select value={userInfo.group} onChange={e => setUserInfo({...userInfo, group: e.target.value})} className="w-full bg-transparent border-b border-[var(--bcg-border)] py-2 outline-none focus:border-[var(--bcg-accent)] transition text-sm font-medium">
                                        {groups.map(g => <option key={g} value={g} className="text-black">{g}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-[10px] font-bold tracking-widest uppercase opacity-60 mb-2">{t.analytics.studentId}</label>
                                    <input type="text" placeholder="e.g. 113212599" value={userInfo.id} onChange={e => setUserInfo({...userInfo, id: e.target.value})} className="w-full bg-transparent border-b border-[var(--bcg-border)] py-2 outline-none focus:border-[var(--bcg-accent)] transition text-sm font-medium" />
                                </div>
                                <div>
                                    <label className="block text-[10px] font-bold tracking-widest uppercase opacity-60 mb-2">{t.analytics.name}</label>
                                    <input type="text" placeholder="e.g. Shihmin Lo" value={userInfo.name} onChange={e => setUserInfo({...userInfo, name: e.target.value})} className="w-full bg-transparent border-b border-[var(--bcg-border)] py-2 outline-none focus:border-[var(--bcg-accent)] transition text-sm font-medium" />
                                </div>
                            </div>
                        </div>

                        {/* Metrics Dashboard */}
                        <div className="lg:col-span-3">
                            <h3 className="text-sm font-bold tracking-widest uppercase border-b border-[var(--bcg-border)] pb-2 mb-8">Real-time Metrics</h3>
                            <div className="grid grid-cols-2 gap-px bg-[var(--bcg-border)] border border-[var(--bcg-border)] mb-8">
                                <div className="p-6 bg-black/5 dark:bg-white/5">
                                    <div className="text-4xl font-serif-title font-bold text-[var(--bcg-accent)] mb-2">{analytics.interactions}</div>
                                    <div className="text-[10px] font-bold tracking-widest uppercase opacity-50">{t.analytics.interactions}</div>
                                </div>
                                <div className="p-6 bg-black/5 dark:bg-white/5">
                                    <div className="text-4xl font-serif-title font-bold text-[var(--bcg-gold)] mb-2">{Math.floor((Date.now() - analytics.startTime) / 1000)}s</div>
                                    <div className="text-[10px] font-bold tracking-widest uppercase opacity-50">{t.analytics.time}</div>
                                </div>
                                <div className="p-6 bg-black/5 dark:bg-white/5">
                                    <div className="text-4xl font-serif-title font-bold mb-2">{analytics.quizTotal > 0 ? Math.round((analytics.quizScore/analytics.quizTotal)*100) : 0}%</div>
                                    <div className="text-[10px] font-bold tracking-widest uppercase opacity-50">Quiz Accuracy</div>
                                </div>
                                <div className="p-6 bg-black/5 dark:bg-white/5">
                                    <div className="text-4xl font-serif-title font-bold mb-2">{analytics.cardUsage}</div>
                                    <div className="text-[10px] font-bold tracking-widest uppercase opacity-50">Card Flips</div>
                                </div>
                            </div>

                            <div className="space-y-4">
                                <label className="flex items-center space-x-3 cursor-pointer opacity-70 hover:opacity-100 transition">
                                    <input type="checkbox" checked={shouldClearData} onChange={e => setShouldClearData(e.target.checked)} className="w-4 h-4 accent-[var(--bcg-primary)] rounded-none" />
                                    <span className="text-[10px] font-bold tracking-widest uppercase">{t.analytics.clear}</span>
                                </label>
                                <button onClick={exportCSV} className="w-full py-4 bg-[var(--bcg-primary)] text-white text-[10px] font-bold tracking-widest uppercase hover:bg-opacity-90 transition flex items-center justify-center gap-2">
                                    <Icon name="download" className="w-4 h-4" /> {t.analytics.export}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Render Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // ==========================================
        // 4. FRONT-END DEFENSE (Key/Right-Click Blocker)
        // ==========================================
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || 
               (e.ctrlKey && e.shiftKey && ['I', 'J', 'C'].includes(e.key.toUpperCase())) || 
               (e.ctrlKey && ['U', 'S', 'P'].includes(e.key.toUpperCase()))) {
                e.preventDefault();
            }
        });

    </script>
</body>
</html>
